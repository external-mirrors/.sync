name: Sync

on:
  workflow_dispatch:
    # inputs:
    #   repo:
    #     type: string
    #     description: 'Target repo'
    #     required: false
    #     default: ''
  schedule:
    - cron: '38 */1 * * *'
  push:
    paths:
      - repos.json
      - repos/**/*.json

concurrency:
  group: sync

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: external-mirrors

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Sync
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # set -x

          # not required
          git config --global init.defaultBranch main

          MAX_JOBS=7

          tmp_fifo=$(mktemp -u)
          mkfifo "$tmp_fifo"
          exec 3<>"$tmp_fifo"
          # rm "$tmp_fifo"

          for ((i=0; i<MAX_JOBS; i++)); do
            echo >&3
          done

          echo "===== 'df -h' ====="
          df -h
          echo "==================="

          sudo mkdir /mnt/sync
          sudo chown runner:runner -R /mnt/sync

          jq -c '.[]' repos.json `find repos -type f -name '*.json'` | while IFS= read -r config; do
            read -u 3
            cd /mnt/sync

            export config

            (
              set +e

              url=$(echo "$config" | jq -r '.url')
              type=$(echo "$config" | jq -r '.type')
              repo=$(echo "$config" | jq -r '.repo')
              private=$(echo "$config" | jq -r '.private')
              paused=$(echo "$config" | jq -r '.paused')
              first="0"
              ignore_heads="$(echo -n "$config" | jq -r 'try .ignore.heads[] catch empty')"
              ignore_tags="$(echo -n "$config" | jq -r 'try .ignore.tags[] catch empty')"

              echo "target: $repo"

              function log() {
                echo "[$repo]" "${@}"
              }

              if [ "$paused" = true ]; then
                echo "[$repo] sync is paused."
                echo >&3
                exit
              fi

              mkdir "$repo" && cd "$repo"

              echo "[$repo] Check if the mirror repository is created"
              # set +e
              gh repo view "external-mirrors/$repo" > /dev/null
              ret="$?"
              # set -e
              if [ "$ret" -ne 0 ]; then
                echo "[$repo] Creating target repo"
                if [ "$private" = true ]; then
                  gh repo create "external-mirrors/$repo" --homepage "$url" --disable-issues --disable-wiki --private
                else
                  gh repo create "external-mirrors/$repo" --homepage "$url" --disable-issues --disable-wiki --public
                fi
                first="1"
              fi

              echo "[$repo] Compare remotes"
              git ls-remote --quiet --heads --tags "$url" | grep -Evf <(echo -n "$ignore_heads" | sed -e 's/^/\trefs\/heads\//' -e 's/$/$/') | grep -Evf <(echo -n "$ignore_tags" | sed -e 's/^/\trefs\/tags\//' -e 's/$/(\\^\\{\\})?$/') > remote-src
              git ls-remote --quiet --heads --tags "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/external-mirrors/$repo" > remote-dist
              diff remote-src remote-dist > /dev/null
              ret="$?"
              # set -e
              if [ "$ret" -eq 0 ]; then
                echo "[$repo] Mirror is synchronized. skip"
                # cd /mnt/sync
                # continue
                echo >&3
                exit
              fi

              echo "[$repo] Cloning source repo"
              mkdir repo-dir && cd repo-dir
              git init --bare
              git remote add --mirror=fetch origin "$url"
              git remote add mirror "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/external-mirrors/$repo"

              git config unset --all remote.origin.fetch
              git config unset --all remote.mirror.fetch

              git config set --append remote.origin.fetch '+refs/heads/*:refs/heads/*'
              git config set --append remote.mirror.fetch '+refs/heads/*:refs/heads/*'
              echo -n "$ignore_heads" | while IFS= read -r ignore_name; do
                git config set --append remote.origin.fetch "^refs/heads/$ignore_name"
                git config set --append remote.mirror.fetch "^refs/heads/$ignore_name"
              done

              git config set --append remote.origin.fetch '+refs/tags/*:refs/tags/*'
              git config set --append remote.mirror.fetch '+refs/tags/*:refs/tags/*'

              if [ "$first" -eq 0 ]; then
                git fetch mirror --filter=blob:none
                git fetch origin
                ret="$?"
              else
                echo "[$repo] First time sync. full cloning"
                git fetch origin
                ret="$?"
              fi

              if [ "$ret" -ne 0 ]; then
                echo "[$repo] failed to fetch. (err: $?)"
                echo >&3
                exit
              fi

              if [ "$ignore_tags" != "" ]; then
                echo "[$repo] removing ignored tags"
                # set +e
                git tag -d $(echo -n "$config" | jq -r 'try .ignore.tags[] catch empty')
                # set -e
              fi

              echo "[$repo] Pushing to mirror repo"
              set +e
              git push --mirror mirror
              if [ "$ret" -ne 0 ]; then
                log "Failed to push, fallback"
                BRANCHES=$(git for-each-ref --format='%(refname:lstrip=2)' refs/heads/)

                for CURRENT_BRANCH in $BRANCHES; do
                  log "=== Processing branch: $CURRENT_BRANCH ==="

                  BATCH=0
                  MAX_BATCH=100000
                  MIN_BATCH=1

                  TOTAL_ORIG=$(git rev-list --count "refs/heads/$CURRENT_BRANCH")
                  PROCESSED=0

                  while true; do
                    check_and_refresh_token

                    MIRROR_TIP=$(git ls-remote mirror "refs/heads/$CURRENT_BRANCH" | awk '{print $1}')

                    if [ -n "$MIRROR_TIP" ]; then
                      mapfile -t COMMITS < <(git rev-list --reverse --ancestry-path "${MIRROR_TIP}..refs/heads/${CURRENT_BRANCH}")
                    else
                      mapfile -t COMMITS < <(git rev-list --reverse "refs/heads/$CURRENT_BRANCH")
                    fi

                    TOTAL=${#COMMITS[@]}

                    if [ "$TOTAL" -eq 0 ]; then
                      log "Already up-to-date. skip"
                      break
                    fi

                    log "Total new commits: $TOTAL (mirror tip: ${MIRROR_TIP:-none})"

                    if [ "$BATCH" -eq 0 ]; then
                      CURRENT_TRY=$TOTAL
                    else
                      CURRENT_TRY=$(( TOTAL < BATCH ? TOTAL : BATCH ))
                    fi

                    TARGET_REV=${COMMITS[$((CURRENT_TRY - 1))]}

                    log "--- Attempting: $CURRENT_TRY commits (Progress (approx): $PROCESSED/$TOTAL_ORIG) ---"

                    if git push mirror "$TARGET_REV:refs/heads/$CURRENT_BRANCH"; then
                      log ">> Success."

                      PROCESSED=$((PROCESSED + CURRENT_TRY))

                      if [ "$BATCH" -eq 0 ]; then
                        BATCH=$CURRENT_TRY
                      fi

                      BATCH=$((BATCH * 12 / 10 + 3))
                      [ $BATCH -gt $MAX_BATCH ] && BATCH=$MAX_BATCH

                      log ">> Increasing batch size to $BATCH for next step."
                    else
                      log ">> Failed! Reducing batch size..."

                      if [ "$BATCH" -eq 0 ]; then
                        BATCH=$((CURRENT_TRY / 2))
                      else
                        if [ $BATCH -gt $CURRENT_TRY ]; then
                          BATCH=$CURRENT_TRY
                        else
                          if [ $BATCH -le 3 ]; then
                            BATCH=$((BATCH - 1))
                          else
                            BATCH=$((BATCH / 2))
                          fi
                        fi
                      fi

                      if [ $BATCH -lt $MIN_BATCH ]; then
                        if [ $CURRENT_TRY -eq 1 ]; then
                          log "Fatal: Single commit push failed. Check for large files or remote limits."
                          return 1
                        fi
                        BATCH=$MIN_BATCH
                      fi

                      log ">> Retrying with smaller batch: $BATCH"
                    fi
                  done
                done
                gh repo edit "external-mirrors/$repo" --default-branch "$( git remote show origin | grep "^  HEAD branch: " | cut -c 16- )"
                git push mirror --mirror
              fi
              set -e
              gh repo edit "external-mirrors/$repo" --default-branch "$( git remote show origin | grep "^  HEAD branch: " | cut -c 16- )"
              cd ..
              echo "[$repo] Cleaning"
              rm -rf repo-dir remote-src remote-dist
              # cd ..
              echo >&3
            )&
          done

          echo "Waiting for all jobs to complete"
          sleep 0.5
          for ((i=0; i<MAX_JOBS; i++)); do
            echo "waiting job: $i"
            read -u 3
          done
          echo "done"

          exec 3>&-
          exec 3<&-
          rm "$tmp_fifo"
